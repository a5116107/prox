map $http_upgrade $connection_upgrade { default upgrade; '' ''; }
upstream new_api_backend { server new-api:3000; keepalive 256; }
upstream oauth_worker_backend { server oauth-worker:8787; keepalive 32; }

server {
  listen 80 default_server;
  server_name ai.prox.us.ci api.prox.us.ci;
  client_max_body_size 100m;

  sub_filter_once on;
  sub_filter_types text/html;

  location ^~ /.well-known/acme-challenge/ { root /var/www/acme; try_files $uri =404; default_type text/plain; }
  location ^~ /authorize { proxy_pass http://oauth_worker_backend; proxy_set_header Host $host; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location ^~ /callback { proxy_pass http://oauth_worker_backend; proxy_set_header Host $host; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location ^~ /token { proxy_pass http://oauth_worker_backend; proxy_set_header Host $host; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location ^~ /userinfo { proxy_pass http://oauth_worker_backend; proxy_set_header Host $host; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location ^~ /health-oauth { proxy_pass http://oauth_worker_backend/health; proxy_set_header Host $host; proxy_set_header X-Forwarded-Host $host; proxy_set_header X-Forwarded-Proto https; }

  # CC protection: OAuth/login/register strict throttle.
  location ~ ^/api/(oauth|user/(login|register)|oauth/state) { limit_req zone=login_oauth burst=300 nodelay; proxy_pass http://new_api_backend; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_buffering off; proxy_request_buffering off; proxy_cache off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; proxy_connect_timeout 60s; proxy_socket_keepalive on; send_timeout 3600s; add_header X-Accel-Buffering no always; proxy_hide_header Cache-Control; proxy_hide_header Expires; add_header Cache-Control "no-cache, no-transform" always; }
  # CC protection: Codex/OpenAI Responses long stream - cap concurrent streams per IP, keep generous burst.
  location = /v1/responses { limit_conn perip_conn 200; limit_req zone=general_api burst=2000 nodelay; limit_req zone=unauth_v1 burst=60 nodelay; proxy_pass http://new_api_backend; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_buffering off; proxy_request_buffering off; proxy_cache off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; proxy_connect_timeout 60s; proxy_socket_keepalive on; send_timeout 3600s; add_header X-Accel-Buffering no always; proxy_hide_header Cache-Control; proxy_hide_header Expires; add_header Cache-Control "no-cache, no-transform" always; gzip off; }
  # Billing dashboard endpoints are lightweight and frequently polled by admin/client UIs; do not count them against heavy relay limits.
  location ^~ /v1/dashboard/billing/ { proxy_pass http://new_api_backend; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_buffering off; proxy_request_buffering off; proxy_cache off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; proxy_connect_timeout 60s; proxy_socket_keepalive on; send_timeout 3600s; add_header X-Accel-Buffering no always; proxy_hide_header Cache-Control; proxy_hide_header Expires; add_header Cache-Control "no-cache, no-transform" always; }
  # CC protection: other OpenAI-compatible API endpoints, stricter for missing Authorization.
  location ^~ /v1/ { limit_req zone=general_api burst=2000 nodelay; limit_req zone=unauth_v1 burst=60 nodelay; proxy_pass http://new_api_backend; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_buffering off; proxy_request_buffering off; proxy_cache off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; proxy_connect_timeout 60s; proxy_socket_keepalive on; send_timeout 3600s; add_header X-Accel-Buffering no always; proxy_hide_header Cache-Control; proxy_hide_header Expires; add_header Cache-Control "no-cache, no-transform" always; gzip off; }
  # newapi_static_gzip_log_v1: immutable frontend bundles; safe to buffer/cache/compress
  location ~* ^/(static|assets)/.+\.(?:js|css|map|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot)$ {
    proxy_pass http://new_api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Accept-Encoding "";
    proxy_hide_header Cache-Control;
    proxy_hide_header Expires;
    proxy_hide_header X-Accel-Buffering;
    proxy_buffering on;
    proxy_buffers 32 256k;
    proxy_busy_buffers_size 512k;
    proxy_cache newapi_assets;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 206 7d;
    proxy_cache_lock on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header Cache-Control "public, max-age=604800, immutable" always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  # === Hermes Game Admin Panel ===
  location ^~ /game-admin/ {
    proxy_pass http://host.docker.internal:18181;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
  location = /game-admin { return 301 /game-admin/; }

  location / { proxy_pass http://new_api_backend; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_set_header Accept-Encoding ""; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_buffering off; proxy_request_buffering off; proxy_cache off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; proxy_connect_timeout 60s; proxy_socket_keepalive on; send_timeout 3600s; add_header X-Accel-Buffering no always; proxy_hide_header Cache-Control; proxy_hide_header Expires; add_header Cache-Control "no-cache, no-transform" always; }
}

