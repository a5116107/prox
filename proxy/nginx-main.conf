user  nginx;
worker_processes  auto;
worker_rlimit_nofile 1048576;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    use epoll;
    worker_connections 8192;
    multi_accept on;
}

http {
    # newapi_static_gzip_log_v1: static asset cache zone
    proxy_cache_path /var/cache/nginx/newapi_assets levels=1:2 keys_zone=newapi_assets:64m max_size=1024m inactive=7d use_temp_path=off;

    # Keep Nginx available while Docker restores containers in arbitrary order,
    # and refresh the active application addresses during rolling releases.
    resolver 127.0.0.11 valid=2s ipv6=off;
    resolver_timeout 2s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Empty key is not counted by limit_req_zone, so authorized /v1 traffic bypasses unauth_v1.
    map $http_authorization $unauth_v1_key {
        default "";
        ""      $binary_remote_addr;
    }

    # Strict auth/OAuth/register throttle: 10 requests/minute per real IP.
    limit_req_zone $binary_remote_addr zone=login_oauth:20m rate=300r/m;
    # General API request-start throttle: 120 requests/minute per real IP.
    limit_req_zone $binary_remote_addr zone=general_api:30m rate=6000r/m;
    # Anonymous /v1 throttle: 20 requests/minute per real IP.
    limit_req_zone $unauth_v1_key zone=unauth_v1:20m rate=120r/m;
    # Long-stream concurrency cap per real IP.
    limit_conn_zone $binary_remote_addr zone=perip_conn:30m;
    limit_req_status 429;
    limit_conn_status 429;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                      'xff="$http_x_forwarded_for" host="$host" '
                      'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time" '
                      'us="$upstream_status" cache="$upstream_cache_status" gzip="$gzip_ratio" upstream="$upstream_addr" '
                      'reqid="$request_id"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75s;
    keepalive_requests 10000;
    types_hash_max_size 4096;
    server_tokens off;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
